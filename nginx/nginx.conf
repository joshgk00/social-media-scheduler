worker_processes auto;
# Pid file lives in /tmp because the container runs nginx as the non-root
# `nginx` user (UID 101 via nginxinc/nginx-unprivileged). The default
# /var/run/nginx.pid is only writable by root.
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;

    client_max_body_size 100m;
    limit_req_status 429;
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin_per_ip:10m rate=2r/s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'req_id=$request_id';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # X-Forwarded-Proto passthrough (issue #50). Honor only known scheme
    # values from an upstream TLS-terminating proxy, otherwise fall back to
    # this nginx hop's scheme so clients cannot force secure-cookie behavior
    # by sending arbitrary X-Forwarded-Proto values over plain HTTP.
    map $http_x_forwarded_proto $forwarded_proto {
        default $scheme;
        "http"  http;
        "https" https;
        ""      $scheme;
    }

    upstream api_backend {
        server api:3000;
    }

    server {
        # Container-internal port. Must be >= 1024 because the container runs
        # nginx as a non-root user; the host-side port mapping in
        # docker-compose.yml decouples this from the externally-visible port.
        listen 8080;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;

        location = /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/ {
            limit_req zone=api_per_ip burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /media/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-ID $request_id;
        }

        location /admin/ {
            limit_req zone=admin_per_ip burst=10 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location = /index.html {
            root /usr/share/nginx/html;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
            add_header Cache-Control "no-cache";
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
            add_header Cache-Control "no-cache";
        }
    }
}
